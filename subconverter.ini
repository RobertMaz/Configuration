[custom]
;Proxy group
custom_proxy_group=Proxy`url-test`.*`http://cp.cloudflare.com`300,,150

;Rules
surge_ruleset=Proxy,https://raw.githubusercontent.com/RobertMaz/Configuration/main/proxy-surge.list
surge_ruleset=DIRECT,[]GEOIP,RU
surge_ruleset=DIRECT,[]GEOIP,PRIVATE
surge_ruleset=DIRECT,[]MATCH

enable_rule_generator=true
overwrite_original_rules=true
